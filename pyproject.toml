[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "inq"
version = "0.1.0"
description = "Terminal-native web UI for AI-assisted code and document review"
readme = "project-spec.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "anthropic>=0.40",
    "google-genai>=0.7",
    "openai>=1.50",
    "pathspec>=0.12",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "httpx>=0.27",
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[project.scripts]
inq = "inq.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/inq"]
