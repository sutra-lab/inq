name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (3.${{ matrix.py }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        py: ["11", "12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: install python and create venv
        run: |
          uv python install 3.${{ matrix.py }}
          uv venv --python 3.${{ matrix.py }}

      - name: install package
        run: uv pip install -e ".[dev]"

      - name: cli boots
        run: |
          source .venv/bin/activate
          inq --version
          inq --help > /dev/null
          inq init --help > /dev/null
          inq notes --help > /dev/null
          inq auth google --help > /dev/null

      - name: pytest
        run: |
          source .venv/bin/activate
          pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: build
        run: npm run build

      - name: confirm build artifacts shipped to src/inq/web
        run: |
          test -f ../src/inq/web/index.html
          test -d ../src/inq/web/assets
          test -d ../src/inq/web/pdfjs/cmaps
          test -d ../src/inq/web/pdfjs/standard_fonts
