name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: confirm frontend artifacts present
        run: |
          test -f src/inq/web/index.html
          test -d src/inq/web/assets
          test -d src/inq/web/pdfjs/cmaps
          test -d src/inq/web/pdfjs/standard_fonts

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: install python and build deps
        run: |
          uv python install 3.12
          uv venv --python 3.12
          uv pip install build

      - name: build sdist + wheel
        run: |
          source .venv/bin/activate
          python -m build

      - name: confirm frontend shipped in both wheel and sdist
        run: |
          set -euo pipefail
          wheel=$(ls dist/*.whl)
          sdist=$(ls dist/*.tar.gz)
          echo "wheel: $wheel"
          echo "sdist: $sdist"

          wheel_contents=$(unzip -l "$wheel")
          echo "$wheel_contents" | grep -q 'inq/web/index\.html$'
          echo "$wheel_contents" | grep -q 'inq/web/assets/'
          echo "$wheel_contents" | grep -q 'inq/web/pdfjs/cmaps/'
          echo "$wheel_contents" | grep -q 'inq/web/pdfjs/standard_fonts/'

          sdist_contents=$(tar -tzf "$sdist")
          echo "$sdist_contents" | grep -q 'src/inq/web/index\.html$'
          echo "$sdist_contents" | grep -q 'src/inq/web/assets/'
          echo "$sdist_contents" | grep -q 'src/inq/web/pdfjs/cmaps/'
          echo "$sdist_contents" | grep -q 'src/inq/web/pdfjs/standard_fonts/'

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to pypi
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/inq-review
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
